name: Daily Cyber News Agent
on:
  workflow_dispatch: 
  schedule:
    - cron: '0 0 * * *' 

permissions:
  contents: write

jobs:
  generate-post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ask Gemini for News
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          curl -s -X POST "https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=$GEMINI_API_KEY" \
          -H 'Content-Type: application/json' \
          -d '{
            "contents": [{
              "parts":[{
                "text": "Write a professional Jekyll blog post about today top 3 cybersecurity news stories. Focus on impact and mitigation. You MUST NOT wrap your response in markdown code blocks. The very first line of your output MUST be exactly --- to start the front matter. Include layout: post, title, and date: '"$TODAY"'. Output ONLY the raw text."
              }]
            }],
            "safetySettings": [
              {
                "category": "HARM_CATEGORY_DANGEROUS_CONTENT",
                "threshold": "BLOCK_NONE"
              }
            ]
          }' > response.json
          
          python3 -c "import json; r = json.load(open('response.json')); print(r['candidates'][0]['content']['parts'][0]['text'])" > "_posts/${TODAY}-daily-intel.md"
